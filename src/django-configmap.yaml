apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
  namespace: default
data:
  DEBUG: "True"

  ALLOWED_HOSTS: "localhost,127.0.0.1,django,www.souqomali.com,souqomali.com,*"
  CSRF_TRUSTED_ORIGINS: "https://www.souqomali.com,https://souqomali.com,http://www.souqomali.com"

  # PgBouncer
  POSTGRES_DB: "motor-test"
  POSTGRES_HOST: "pgbouncer"
  POSTGRES_PORT: "5432"

  REDIS_URL: "redis://redis:6379"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"

  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_ENABLED: "True"
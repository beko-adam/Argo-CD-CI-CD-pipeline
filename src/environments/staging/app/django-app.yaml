---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: Django App
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL:  https://github.com/beko-adam/Argo-CD-CI-CD-pipeline.git
    targetRevision: HEAD
    path: src/environments/staging/django-app
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:latest
          ports:
            - containerPort: 5432
          env:
            - name: DB_HOST
              value: "hiquota1996.creku0kea815.me-central-1.rds.amazonaws.com"

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: "motor-test"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: POSTGRES_PASSWORD

            - name: AUTH_TYPE
              value: "plain"



            - name: DEFAULT_POOL_SIZE
              value: "50"

            - name: MIN_POOL_SIZE
              value: "10"

            - name: RESERVE_POOL_SIZE
              value: "20"

            - name: MAX_CLIENT_CONN
              value: "2000"
  
            - name: POOL_MODE
              value: "transaction"

          


            - name: ADMIN_USERS
              value: "hiquota1996"